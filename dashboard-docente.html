<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Docente - Ayudantías UCN</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .dashboard-container {
      padding: 120px 2rem 60px;
      max-width: 1000px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .panel-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
    }
    .applicant-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem;
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
    }
    .applicant-row:hover {
      background: rgba(255, 255, 255, 0.02);
    }
    .applicant-row:last-child {
      border-bottom: none;
    }
    .applicant-avatar {
      width: 45px; height: 45px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.2rem;
    }
    .status-badge {
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 700;
    }
    .status-pendiente { background: rgba(244, 162, 97, 0.2); color: var(--warning); border: 1px solid var(--warning); }
    .status-aprobado { background: rgba(46, 196, 182, 0.2); color: var(--success); border: 1px solid var(--success); }
    .status-rechazado { background: rgba(231, 111, 81, 0.15); color: var(--danger); border: 1px solid var(--danger); }
  </style>
</head>
<body>

  <div class="bg-atmosphere">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>
  <div class="bg-grid"></div>

  <nav class="navbar scrolled">
    <a href="index.html" class="nav-brand">
      <div class="brand-icon"><i class="fas fa-graduation-cap"></i></div>
      Ayudantías UCN <span style="font-size: 0.8rem; color: var(--accent-light); margin-left: 10px;">| Panel Docente</span>
    </a>
    <div class="nav-actions">
      <button class="btn btn-ghost" onclick="window.location.href='index.html'">
        <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
      </button>
    </div>
  </nav>

  <div class="dashboard-container">
    <div class="section-header" style="text-align: left; margin-bottom: 3rem;">
      <span class="section-tag">Gestión Académica</span>
      <h2 id="welcomeText">Bienvenido, Profesor</h2>
      <p>Administra las postulaciones recibidas para tus asignaturas activas.</p>
    </div>

    <div id="dynamicDashboardContent"></div>
  </div>

  <div class="modal-overlay" id="confirmModalOverlay" role="dialog" aria-modal="true">
    <div class="modal" style="max-width: 400px; text-align: center;">
      <div class="modal-header" style="justify-content: center; border-bottom: none; padding-bottom: 0;">
        <h3 id="confirmTitle" style="font-size: 1.4rem;">Confirmar Acción</h3>
      </div>
      <div class="modal-body" style="padding-top: 1rem;">
        <p id="confirmMessage" style="color: var(--muted); margin-bottom: 2rem; font-size: 1.05rem;">¿Estás seguro?</p>
        <div style="display: flex; gap: 12px; justify-content: center;">
          <button class="btn btn-ghost" onclick="cerrarModalConfirmacion()">Cancelar</button>
          <button class="btn btn-primary" id="confirmActionBtn">Confirmar</button>
        </div>
      </div>
    </div>
  </div>
  
  
 <script>
   document.addEventListener('DOMContentLoaded', async () => {
  let rawName = localStorage.getItem('docenteNombre') || 'Administrador';
  rawName = rawName.replace(/\b\w/g, char => char.toUpperCase());

  const userRole = localStorage.getItem('userRole') || 'docente';
  const displayRole = userRole === 'admin' ? 'Administrador' : 'Profesor';

  document.getElementById('welcomeText').innerHTML =
    `Bienvenido, ${displayRole} <span class="gradient-text">${rawName}</span>`;

  // El listener del modal también necesita el DOM listo — se mueve aquí
  document.getElementById('confirmActionBtn').addEventListener('click', async () => {
    if (!pendingAction) return;

    const btn = document.getElementById('confirmActionBtn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
    btn.disabled = true;

    await pendingAction();

    btn.innerHTML = 'Confirmar';
    btn.disabled = false;
    cerrarModalConfirmacion();
  });

  await cargarInformacionServidor();
});

// ==========================================
// CARGA Y RENDER DEL PANEL
// ==========================================

async function cargarInformacionServidor() {
  const container = document.getElementById('dynamicDashboardContent');
  container.innerHTML =
    '<p style="color:var(--muted); text-align:center; padding: 2rem;">Cargando asignaturas y postulaciones...</p>';

  try {
    const [resRamos, resPostulaciones] = await Promise.all([
      fetch('http://127.0.0.1:8000/api/ramos'),
      fetch('http://127.0.0.1:8000/api/postulaciones')
    ]);

    if (!resRamos.ok || !resPostulaciones.ok) {
      throw new Error('Error en los datos del servidor');
    }

    const ramosData = await resRamos.json();
    const postulacionesData = await resPostulaciones.json();

    renderizarPanelReal(ramosData, postulacionesData);

  } catch (error) {
    console.error(error);
    container.innerHTML =
      '<p style="color:var(--danger); text-align:center; padding: 2rem;">Error al conectar con el backend. Asegúrate de iniciar FastAPI.</p>';
  }
}

function renderizarPanelReal(ramos, postulaciones) {
  const container = document.getElementById('dynamicDashboardContent');
  let htmlContent = '';

  ramos.forEach(curso => {
    // Ignorar postulaciones rechazadas
    const postulantesCurso = postulaciones.filter(
      p => p.nrc_ramo === curso.codigo_nrc && p.estado !== 'rechazado'
    );

    htmlContent += `
      <div class="panel-card reveal visible">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem;">
          <div>
            <span class="course-code">${curso.codigo_nrc}</span>
            <h3 style="margin-top: 8px; font-size: 1.4rem;">${curso.nombre_ramo}</h3>
            <div style="font-size:0.85rem; color:var(--muted); margin-top:4px;">${curso.departamento}</div>
          </div>
          <div style="text-align: right; color: var(--muted); font-size: 0.9rem;">
            <i class="fas fa-users"></i> ${postulantesCurso.length} / ${curso.cupos} Solicitudes Activas
          </div>
        </div>

        <div style="background: var(--bg-secondary); border-radius: var(--radius-sm); border: 1px solid var(--border);">
          ${postulantesCurso.length > 0
            ? postulantesCurso.map(p => renderizarFila(p)).join('')
            : '<div style="padding: 1.5rem; text-align: center; color: var(--muted);">No hay postulantes activos para esta asignatura.</div>'
          }
        </div>
      </div>
    `;
  });

  container.innerHTML = htmlContent ||
    '<p style="color: var(--muted);">No hay asignaturas registradas.</p>';

  // Delegación de eventos: evita problemas con comillas en onclick inline
  container.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const { nrc, rut, estado, nombre } = btn.dataset;
      abrirModalConfirmacion(nrc, rut, estado, nombre);
    });
  });
}

function renderizarFila(p) {
  const esAceptado = p.estado === 'aceptado';
  const claseBadge = esAceptado ? 'status-aprobado' : 'status-pendiente';
  const textoEstado = esAceptado ? 'Aprobado' : 'En revisión';

  // Se usan data-* attributes en vez de parámetros inline para evitar
  // que comillas simples en nombres o RUTs rompan el HTML
  const botonesAccion = p.estado === 'revision' ? `
    <button
      class="btn btn-primary"
      style="padding: 6px 12px; font-size: 0.8rem; background: var(--success);"
      data-action="cambiar-estado"
      data-nrc="${p.nrc_ramo}"
      data-rut="${p.rut_estudiante}"
      data-estado="aceptado"
      data-nombre="${p.nombre_estudiante}"
    >
      <i class="fas fa-check"></i> Aprobar
    </button>
    <button
      class="btn btn-ghost"
      style="padding: 6px 12px; font-size: 0.8rem; color: var(--danger); border-color: var(--danger);"
      data-action="cambiar-estado"
      data-nrc="${p.nrc_ramo}"
      data-rut="${p.rut_estudiante}"
      data-estado="rechazado"
      data-nombre="${p.nombre_estudiante}"
    >
      <i class="fas fa-times"></i> Rechazar
    </button>
  ` : '';

  return `
    <div class="applicant-row">
      <div style="display: flex; align-items: center; gap: 15px;">
        <div class="applicant-avatar">${p.nombre_estudiante.charAt(0).toUpperCase()}</div>
        <div>
          <div style="font-weight: 700; color: var(--fg); font-size: 1.05rem;">${p.nombre_estudiante}</div>
          <div style="font-size: 0.85rem; color: var(--muted);">
            <i class="fas fa-id-card" style="margin-right: 5px;"></i>RUT: ${p.rut_estudiante}
          </div>
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 12px;">
        <span class="status-badge ${claseBadge}">${textoEstado}</span>
        ${botonesAccion}
      </div>
    </div>
  `;
}

// ==========================================
// LÓGICA DEL MODAL DE CONFIRMACIÓN
// ==========================================

let pendingAction = null;

function abrirModalConfirmacion(nrc, rut, nuevoEstado, nombreEstudiante) {
  const esAprobacion = nuevoEstado === 'aceptado';
  const accionText = esAprobacion ? 'APROBAR' : 'RECHAZAR';
  const color = esAprobacion ? 'var(--success)' : 'var(--danger)';

  document.getElementById('confirmMessage').innerHTML =
    `¿Estás seguro de que deseas <strong style="color:${color};">${accionText}</strong> a <strong>${nombreEstudiante}</strong>?`;

  const btn = document.getElementById('confirmActionBtn');
  btn.style.background = color;
  btn.style.boxShadow = `0 4px 16px ${color}40`;

  pendingAction = () => ejecutarCambioEstado(nrc, rut, nuevoEstado);

  document.getElementById('confirmModalOverlay').classList.add('active');
}

function cerrarModalConfirmacion() {
  document.getElementById('confirmModalOverlay').classList.remove('active');
  pendingAction = null;
}

async function ejecutarCambioEstado(nrc, rut, nuevoEstado) {
  try {
    const response = await fetch('http://127.0.0.1:8000/api/postulaciones/estado', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nrc_ramo: nrc,
        rut_estudiante: rut,
        nuevo_estado: nuevoEstado
      })
    });

    if (!response.ok) throw new Error('Error al modificar el estado en el backend');

    await cargarInformacionServidor();

  } catch (error) {
    console.error(error);
    alert('Ocurrió un error al intentar cambiar el estado de la postulación.');
  }
}
</script>
</body>
</html>
